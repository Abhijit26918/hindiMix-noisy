<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="250mm" viewBox="0 0 680 920" style="background:white;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- INPUT PAIR label -->
<text x="340" y="22" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">INPUT PAIR</text>

<!-- Clean input -->
<rect x="72" y="32" width="216" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="180" y="53" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Clean text  xᶜ</text>
<text x="180" y="71" text-anchor="middle" font-size="11" fill="#0F6E56" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">original utterance</text>

<!-- Noisy input -->
<rect x="392" y="32" width="216" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="500" y="53" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A1B0C" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Noisy text  x̃</text>
<text x="500" y="71" text-anchor="middle" font-size="11" fill="#993C1D" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">ASR-corrupted</text>

<!-- phi bridge -->
<line x1="288" y1="57" x2="392" y2="57" stroke="#888780" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="340" y="53" text-anchor="middle" font-size="10" fill="#5F5E5A" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">φ = JW(·)</text>

<!-- arrows down to encoder -->
<line x1="180" y1="82" x2="180" y2="116" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="82" x2="500" y2="116" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- SHARED ENCODER label -->
<text x="340" y="110" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">SHARED ENCODER  fθ</text>

<!-- Encoder box -->
<rect x="72" y="118" width="536" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Multilingual encoder (mBERT / MuRIL / XLM-R)</text>
<text x="340" y="156" text-anchor="middle" font-size="11" fill="#534AB7" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">shared weights — Hᶜ, H̃ ∈ ℝᴸˣᵈ</text>

<!-- arrows down to gate -->
<line x1="180" y1="168" x2="180" y2="202" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="168" x2="500" y2="202" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- GATE label -->
<text x="340" y="196" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">NOISE-AWARE GATE  gψ</text>

<!-- Gate clean -->
<rect x="72" y="204" width="216" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="180" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Gate — clean</text>
<text x="180" y="242" text-anchor="middle" font-size="11" fill="#185FA5" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">zᶜ = pool(Hᶜ ⊙ σ(WᵍHᶜ))</text>

<!-- Gate noisy -->
<rect x="392" y="204" width="216" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="500" y="224" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Gate — noisy</text>
<text x="500" y="242" text-anchor="middle" font-size="11" fill="#185FA5" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">z̃ = pool(H̃ ⊙ σ(WᵍH̃))</text>

<!-- arrows down to projection -->
<line x1="180" y1="256" x2="180" y2="290" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="256" x2="500" y2="290" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PROJECTION label -->
<text x="340" y="283" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">PROJECTION HEAD  πξ  (2-layer MLP)</text>

<!-- Projection clean -->
<rect x="100" y="292" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="180" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">pᶜ = πξ(zᶜ)</text>

<!-- Projection noisy -->
<rect x="420" y="292" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="500" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">p̃ = πξ(z̃)</text>

<!-- PWNIC bridge — own row, no overlap -->
<line x1="180" y1="336" x2="180" y2="372" stroke="#854F0B" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="500" y1="336" x2="500" y2="372" stroke="#854F0B" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="180" y1="372" x2="237" y2="372" stroke="#854F0B" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="500" y1="372" x2="443" y2="372" stroke="#854F0B" stroke-width="1.2" stroke-dasharray="5 3"/>
<line x1="260" y1="372" x2="286" y2="372" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="372" x2="394" y2="372" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- PWNIC box -->
<rect x="237" y="354" width="206" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.2"/>
<text x="340" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#412402" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">ℒ_PWNIC  (φ-weighted)</text>
<text x="340" y="385" text-anchor="middle" font-size="11" fill="#854F0B" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">InfoNCE · τ=0.15 · α=0.15</text>

<!-- arrows to task heads -->
<line x1="180" y1="336" x2="180" y2="430" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="500" y1="336" x2="500" y2="430" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- noisy branch to aux -->
<path d="M608 314 L640 314 L640 480" fill="none" stroke="#993C1D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- TASK HEADS label -->
<text x="270" y="422" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">TASK HEADS</text>

<!-- Classifier clean -->
<rect x="72" y="430" width="216" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="180" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Classifier (clean)</text>
<text x="180" y="468" text-anchor="middle" font-size="11" fill="#0F6E56" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">ℒ_CE on zᶜ  (class-weighted)</text>

<!-- Classifier noisy -->
<rect x="392" y="430" width="180" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="482" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Classifier (noisy)</text>
<text x="482" y="468" text-anchor="middle" font-size="11" fill="#0F6E56" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">ℒ_CE on z̃</text>

<!-- Aux box -->
<rect x="590" y="480" width="58" height="80" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="619" y="504" text-anchor="middle" font-size="12" font-weight="bold" fill="#412402" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Aux</text>
<text x="619" y="520" text-anchor="middle" font-size="11" fill="#854F0B" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">qη(z̃)</text>
<text x="619" y="536" text-anchor="middle" font-size="11" fill="#854F0B" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">γ=0.2</text>
<text x="619" y="552" text-anchor="middle" font-size="11" fill="#854F0B" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">noise</text>

<!-- arrows to combined loss -->
<line x1="180" y1="482" x2="220" y2="560" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="482" y1="482" x2="380" y2="560" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="619" y1="560" x2="500" y2="560" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- TRAINING OBJECTIVE label -->
<text x="340" y="552" text-anchor="middle" font-size="11" letter-spacing="1.2" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">TRAINING OBJECTIVE</text>

<!-- Combined loss -->
<rect x="72" y="560" width="536" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="580" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">ℒ = ℒ_CE + α·ℒ_PWNIC + γ·ℒ_aux</text>
<text x="340" y="598" text-anchor="middle" font-size="11" fill="#534AB7" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">α=0.15   γ=0.20   (ℒ_aux auto-disabled for single noise level)</text>

<!-- arrow to output -->
<line x1="340" y1="612" x2="340" y2="648" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Output -->
<rect x="172" y="648" width="336" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="340" y="668" text-anchor="middle" font-size="13" font-weight="bold" fill="#173404" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Prediction: hate / non-hate</text>
<text x="340" y="685" text-anchor="middle" font-size="11" fill="#3B6D11" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">macro-averaged F1</text>

<!-- Legend -->
<line x1="72" y1="724" x2="608" y2="724" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<text x="72" y="742" font-size="10" letter-spacing="0.8" fill="#888780" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">LEGEND</text>
<rect x="72" y="752" width="10" height="10" rx="2" fill="#1D9E75"/>
<text x="88" y="762" font-size="11" fill="#444441" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Clean stream</text>
<rect x="210" y="752" width="10" height="10" rx="2" fill="#D85A30"/>
<text x="226" y="762" font-size="11" fill="#444441" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Noisy stream</text>
<rect x="348" y="752" width="10" height="10" rx="2" fill="#534AB7"/>
<text x="364" y="762" font-size="11" fill="#444441" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Shared module</text>
<rect x="486" y="752" width="10" height="10" rx="2" fill="#BA7517"/>
<text x="502" y="762" font-size="11" fill="#444441" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Loss / objective</text>
<line x1="72" y1="784" x2="100" y2="784" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="106" y="788" font-size="11" fill="#444441" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">Auxiliary path (auto-disabled for single noise level)</text>
</svg>
